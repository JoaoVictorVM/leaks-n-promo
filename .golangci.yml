version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - copyloopvar
    - gocritic
    - gosec
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - wrapcheck
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: errorf
        - name: indent-error-flow
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
      # Pacotes do próprio módulo não são "externos": já retornam erros com
      # contexto, então não exigem novo wrap ao cruzar fronteiras internas.
      ignore-package-globs:
        - github.com/JoaoVictorVM/leaks-n-promo/*
  exclusions:
    generated: lax
    rules:
      # Em testes liberamos checagens mais rígidas que não agregam valor.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - wrapcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/JoaoVictorVM/leaks-n-promo
