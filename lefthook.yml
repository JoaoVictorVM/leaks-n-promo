# Hooks de git locais. Instale com: lefthook install

# Desliga as cores ANSI: alguns terminais do Windows não as interpretam e
# mostram códigos de escape crus, dando aparência de travamento no commit.
colors: false

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: golangci-lint fmt --diff
    lint:
      glob: "*.go"
      run: golangci-lint run
    test:
      glob: "*.go"
      run: go test ./...

# {1} é o caminho do arquivo da mensagem que o git passa ao hook commit-msg.
commit-msg:
  commands:
    conventional:
      run: go run ./tools/commit-lint {1}
